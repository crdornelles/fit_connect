name: fitconnect
description: FitConnect - Plataforma de referral entre personal trainers e clientes. App de exemplo para série sobre Deep Links em Flutter.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.0.0
  flutter: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_modular: ^6.3.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
